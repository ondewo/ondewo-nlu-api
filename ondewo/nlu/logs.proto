syntax = "proto3";

package ondewo.nlu;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Log levels for various system operations.
enum LogLevel {
    // Unspecified log level.
    LOG_LEVEL_UNSPECIFIED = 0;
    // Debug level - detailed information for troubleshooting.
    LOG_LEVEL_DEBUG = 1;
    // Info level - general operational messages.
    LOG_LEVEL_INFO = 2;
    // Warning level - potential issues that don't stop execution.
    LOG_LEVEL_WARN = 3;
    // Error level - serious issues that might affect results.
    LOG_LEVEL_ERROR = 4;
    // Fatal level - critical failures that stop the process.
    LOG_LEVEL_FATAL = 5;
}

// Specific context for crawler-related log entries.
message CrawlerLogContext {
    // The URL being processed when this log was generated.
    string source_url = 1;

    // The batch index of the crawl operation.
    optional int32 batch_index = 2;

    // The HTTP status code returned by the target server.
    optional int32 http_status_code = 3;
}

// Container for domain-specific log metadata.
message LogEntryContext {
    oneof context {
        // Context specific to crawler runs.
        CrawlerLogContext crawler = 1;

        // Future contexts (e.g., webhook, training, etc.) can be added here.
    }
}

// A generic log entry structure.
message LogEntry {
    // Unique ID of the log entry.
    string id = 1;

    // Sequence index within the run.
    int32 sequence_index = 2;

    // Timestamp of the log.
    google.protobuf.Timestamp logged_at = 3;

    // Severity of the log.
    LogLevel level = 4;

    // Execution phase (e.g. "discovery", "extraction").
    string phase = 5;

    // Human-readable message.
    string message = 6;

    // Raw details in JSON format.
    google.protobuf.Struct details_json = 7;

    // Grouped domain-specific metadata.
    LogEntryContext log_context = 8;
}
